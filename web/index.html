<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0F14">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cortex">
<title>Cortex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0F14; --panel:#11171F; --panel2:#161E28; --line:#1F2A36;
  --ink:#EAF2F8; --mut:#8597A6; --accent:#00DAFF; --accent2:#00C4E0;
  --good:#2ad17e; --warn:#ffb020; --bad:#ff5d6c; --shadow:0 10px 30px rgba(0,0,0,.45);
}
html[data-theme="light"]{
  --bg:#EEF2F6; --panel:#FFFFFF; --panel2:#F4F8FB; --line:#DCE5EC;
  --ink:#0C1620; --mut:#5A6B79; --accent:#00C4E0; --accent2:#0098B3; --shadow:0 10px 30px rgba(20,40,60,.12);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow-x:hidden;overscroll-behavior:none;width:100%}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,.brand,.tab,.btn{font-family:Poppins,Inter,sans-serif}
a{color:var(--accent)}
.wrap{max-width:780px;margin:0 auto;padding:0 16px 116px}
/* top bar */
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:6px;padding:11px 12px}
.brand{font-weight:700;font-size:19px;letter-spacing:.2px;display:flex;align-items:center;gap:7px;flex:none}
.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);
  animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.spacer{flex:1}
.iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);width:36px;height:36px;
  border-radius:10px;cursor:pointer;font-size:15px;display:grid;place-items:center;flex:none}
.iconbtn:active{transform:scale(.94)}
.iconbtn.rec,.btn.rec{background:var(--bad);border-color:var(--bad);color:#fff;animation:pulse 1s infinite}
.sel{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;
  padding:8px 6px;font:inherit;font-size:13px;max-width:118px;min-width:0;flex-shrink:1}
/* tabs */
.tabs{display:flex;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom));justify-content:center}
.tab{flex:1;max-width:200px;text-align:center;background:transparent;border:1px solid transparent;color:var(--mut);
  padding:9px 6px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600}
.tab.on{color:var(--bg);background:var(--accent);border-color:var(--accent)}
.tab .e{font-size:17px;display:block;margin-bottom:2px}
/* cards */
.h{font-family:Poppins;font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mut);margin:22px 4px 12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;
  box-shadow:var(--shadow)}
.meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);margin-bottom:8px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:11px;
  color:var(--ink);font-weight:600}
.chip.cy{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
.title{font-family:Poppins;font-weight:600;font-size:17px;margin:2px 0 8px;line-height:1.3}
.body{font-size:14px;color:var(--ink);opacity:.92;line-height:1.55;white-space:pre-wrap;
  max-height:230px;overflow:auto;border-left:2px solid var(--line);padding-left:12px;margin:6px 0 14px}
.row{display:flex;gap:9px;flex-wrap:wrap}
.btn{flex:1;min-width:96px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  padding:11px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer}
.btn:active{transform:scale(.97)}
.btn.go{background:var(--accent);border-color:var(--accent);color:#04181d}
.btn.warn{color:var(--warn)}
.btn.bad{color:var(--bad)}
.empty{text-align:center;color:var(--mut);padding:48px 16px;font-size:14px}
.empty .e{font-size:34px;display:block;margin-bottom:10px;opacity:.5}
/* ask composer */
label{display:block;font-size:12px;color:var(--mut);margin:14px 2px 6px;font-weight:600;letter-spacing:.04em}
textarea,input,.field{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:13px;padding:13px;font:inherit;font-size:15px}
textarea{min-height:120px;resize:vertical;line-height:1.5}
.seg{display:flex;gap:8px}.seg .btn{padding:10px}
.seg .btn.on{background:var(--accent);border-color:var(--accent);color:#04181d}
/* log */
.logitem{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--line)}
.led{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.led.publish,.led.approve,.led.auto,.led.rule_confirmed{background:var(--good)}
.led.reject{background:var(--bad)}.led.correct{background:var(--warn)}
.logmain{flex:1;min-width:0}.logmain b{font-weight:600}.logmain .s{font-size:12px;color:var(--mut)}
/* login */
.login{position:fixed;inset:0;background:var(--bg);z-index:50;display:grid;place-items:center;padding:24px}
.login .box{width:100%;max-width:360px;text-align:center}
.login .brand{justify-content:center;font-size:30px;margin-bottom:6px}
.login p{color:var(--mut);font-size:14px;margin:0 0 22px}
.login input{text-align:center;letter-spacing:.3em;font-size:18px;margin-bottom:12px}
.lock{position:fixed;inset:0;background:var(--bg);z-index:60;display:grid;place-items:center;padding:24px}
.lbox{width:100%;max-width:300px;text-align:center}
.lbox .brand{justify-content:center;font-size:28px;margin-bottom:8px}
.lbox p{color:var(--mut);font-size:14px;margin:0 0 18px}
.pindots{display:flex;gap:14px;justify-content:center;margin-bottom:26px}
.pd{width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
.pd.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent)}
.keypad{display:grid;grid-template-columns:repeat(3,64px);gap:18px;justify-content:center;margin:0 auto}
.kp{width:64px;height:64px;border-radius:50%;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:23px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.kp:active{background:var(--panel2);transform:scale(.95)}
.kp.ghost{background:none;border:none;pointer-events:none}
#lockerr{color:var(--bad);font-size:13px;margin-top:14px;min-height:18px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--panel);
  border:1px solid var(--line);color:var(--ink);padding:11px 16px;border-radius:12px;box-shadow:var(--shadow);
  font-size:13px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1}
.hidden{display:none!important}
/* CRM pages */
.crmseg{display:flex;gap:6px;margin:14px 2px 4px}
.cseg{flex:1;text-align:center;padding:9px 3px;border-radius:11px;font-family:Poppins;font-weight:600;font-size:11.5px;color:var(--mut);background:var(--panel);border:1px solid var(--line);cursor:pointer;white-space:nowrap}
.cseg.on{background:var(--accent);border-color:var(--accent);color:#04181d}
.srch{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin:14px 0 12px;color:var(--mut)}
.srch input{flex:1;background:none;border:none;color:var(--ink);font:inherit;font-size:15px;outline:none;padding:0}
.chiprow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.fchip{border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--mut);background:var(--panel2);border:1px solid var(--line);cursor:pointer}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#04181d}
.crow{display:flex;align-items:center;gap:11px;padding:12px 13px}
.cav{width:36px;height:36px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;color:var(--accent);flex:none}
.cname{font-family:Poppins;font-weight:600;font-size:14.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csub{font-size:12.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis}
.mrow{display:flex;gap:10px;margin:16px 0 6px}
.mcard{flex:1;background:var(--panel2);border-radius:12px;padding:13px;min-width:0}
.ml{font-size:11.5px;color:var(--mut)}
.mv{font-family:Poppins;font-size:21px;font-weight:600;color:var(--ink);margin-top:2px}
.prow{display:flex;align-items:center;gap:11px;padding:13px}
.pval{font-family:Poppins;font-weight:600;font-size:14px;color:var(--ink)}
.orow{display:flex;align-items:center;gap:8px}
.qhead{display:flex;align-items:center;gap:10px;margin:16px 2px 8px;font-family:Poppins;font-weight:600}
.dgrid{display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--line);padding-top:12px}
.dfld{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink);min-width:0}
.dfld svg{color:var(--mut);flex:none}
.dsec{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.dlbl{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.dnote{font-size:14px;color:var(--ink);line-height:1.5}
.hitem{display:flex;gap:10px;margin-bottom:9px;font-size:13px}
.hled{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
.iconbtn.sm{width:32px;height:32px}
.ibhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 2px 6px}
.btn.sm{padding:7px 11px;font-size:13px;width:auto}
.nta{width:100%;box-sizing:border-box;background:var(--panel2,#0e1620);color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:10px 12px;font:inherit;font-size:14px;resize:vertical}
.fsel{width:100%;box-sizing:border-box;background:var(--panel2,#0e1620);color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 12px;font:inherit;font-size:15px;-webkit-appearance:none;appearance:none}
.fsel[type=time]{appearance:auto}
/* chat */
.chatlog{display:flex;flex-direction:column;gap:10px;padding:8px 2px 152px}
.convbar{display:flex;gap:8px;align-items:center;margin:0 2px 4px}
.convsel{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:9px 10px;font:inherit;font-size:13px}
.bub{max-width:84%;padding:11px 14px;border-radius:16px;font-size:15px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
.bub.u{align-self:flex-end;background:var(--accent);color:#04181d;border-bottom-right-radius:5px}
.bub.a{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
.who{align-self:flex-start;font-size:11px;color:var(--accent);margin:2px 0 -3px 4px;font-weight:600;letter-spacing:.02em}
.bub.live{opacity:.55;font-style:italic}
.dock{position:fixed;left:0;right:0;bottom:calc(60px + env(safe-area-inset-bottom));z-index:21;
  padding:10px 14px;border-top:1px solid var(--line);
  background:color-mix(in srgb,var(--bg) 96%,transparent);backdrop-filter:blur(10px)}
.inrow{display:flex;gap:8px;align-items:center}
.inrow .cin{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:13px;padding:12px 13px;font:inherit;font-size:15px;min-width:0}
.iconbtn.send{background:var(--accent);border-color:var(--accent);color:#04181d}
.iconbtn.sm{width:34px;height:34px}
.freehint{text-align:center;font-size:12px;color:var(--accent);font-weight:600;display:none;margin-bottom:7px}
.freehint.on{display:block}
.livepanel{border:1px solid var(--accent);border-radius:14px;padding:10px 13px;margin-bottom:9px;
  background:color-mix(in srgb,var(--accent) 9%,var(--bg))}
.livehead{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--accent);font-weight:600;margin-bottom:5px}
.livedot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.1s infinite;flex:none}
.livetext{font-size:18px;line-height:1.45;color:var(--ink);max-height:104px;overflow-y:auto}
.livetext[contenteditable="true"]{cursor:text}
.livetext:focus{outline:none;box-shadow:0 0 0 1px var(--accent);border-radius:6px}
.moderow{display:flex;gap:8px;margin-top:8px}
.mbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;height:52px;border-radius:14px;
  background:var(--panel);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:14px;font-weight:600;cursor:pointer;line-height:1.15}
.mbtn .sub{font-size:11px;color:var(--mut);font-weight:400}
.mbtn.on{background:var(--accent);border-color:var(--accent);color:#04181d}
.mbtn.on .sub{color:#04181d;opacity:.75}
.autopill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);margin:2px 2px 12px;cursor:pointer}
.autopill .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachprev{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.attachprev .thumb{position:relative;width:54px;height:54px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.attachprev .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.attachprev .thumb button{position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.msgimg{max-width:160px;border-radius:12px;margin:4px 0;display:block;border:1px solid var(--line)}
/* skills screen */
.cath{font-family:Poppins;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:18px 2px 8px}
.dept{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:8px;cursor:pointer}
.deptsub{font-size:12px;color:var(--mut);margin-top:2px}
.chev{color:var(--mut);font-size:13px;flex:none;margin-left:8px}
.qbtn{background:none;border:none;color:var(--accent);padding:3px;cursor:pointer;display:flex;align-items:center}
/* questionnaire flow */
.qhead{display:flex;align-items:center;gap:10px;margin:2px 2px 14px}
.qtitle{font-family:Poppins;font-weight:700;font-size:16px}
.qsub{font-size:12px;color:var(--mut);margin-top:1px}
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px}
.qcardh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.qcardh b{font-size:15px}
.qchip{font-size:11px;color:var(--mut);background:var(--bg2,rgba(127,127,127,.12));border:1px solid var(--line);border-radius:8px;padding:2px 7px}
.qprog{font-size:12.5px;color:var(--mut)}
.qwarn{font-size:12px;color:var(--mut);font-style:italic}
.qprogbar{height:5px;border-radius:3px;background:var(--line);margin:2px 2px 14px;overflow:hidden}
.qprogbar div{height:100%;background:var(--accent);transition:width .25s}
.qq{font-size:18px;line-height:1.4;font-weight:500;margin:6px 2px 14px}
.qopts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.qopt{text-align:left;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 13px;font:inherit;font-size:14px;cursor:pointer}
.qopt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,var(--bg))}
.qansta{width:100%;min-height:74px;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:11px 13px;font:inherit;font-size:15px;resize:vertical}
.qrule{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.qinc{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);margin-bottom:5px}
.qruletext{font-size:14px;line-height:1.45}
.qmeta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.qconflict{font-size:12px;color:#ffcf6e;margin-top:8px;line-height:1.4}
.qover{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--mut);margin-top:6px}
.skill{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:0 0 7px 12px;cursor:pointer}
.sname{font-size:14px;font-weight:500}
.schips{display:flex;gap:6px;flex:none}
.rchip,.achip{font-size:11px;border-radius:999px;padding:3px 9px;background:var(--bg);border:1px solid var(--line);color:var(--mut)}
.rchip.has{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
.achip{text-transform:uppercase;letter-spacing:.05em}
.sdetail{margin:0 0 10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px}
.craftlabel{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);font-weight:600;margin:2px 0 5px}
.craft{font-size:13px;color:var(--ink);opacity:.9;line-height:1.5;margin-bottom:12px}
.rule{display:flex;gap:8px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:6px;font-size:13px}
.rule span{flex:1}
.rx{background:none;border:none;color:var(--bad);font-size:13px;cursor:pointer;flex:none;padding:0 2px}
.norule{font-size:12.5px;color:var(--mut);margin-bottom:10px}
.addrule{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.addrule input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 11px;font:inherit;font-size:13px;min-width:120px}
.addrule .btn{flex:none;min-width:60px;padding:9px}
.rscope{flex:none;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 6px;font:inherit;font-size:12px;max-width:140px}
.rule.uni{border-color:color-mix(in srgb,var(--accent) 40%,var(--line));background:color-mix(in srgb,var(--accent) 7%,var(--panel2))}
.rulehint{font-weight:400;text-transform:none;letter-spacing:0;color:var(--mut);font-size:10px}
.tabs .tab{padding:9px 3px;font-size:12px}.tabs .tab .e{font-size:16px}
.banner{background:color-mix(in srgb,var(--warn) 14%,var(--panel));border:1px solid color-mix(in srgb,var(--warn) 40%,var(--line));
  color:var(--ink);border-radius:12px;padding:10px 13px;font-size:12.5px;margin:14px 0}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="box">
    <div class="brand"><span class="dot"></span>Cortex</div>
    <p>Your AI operations cockpit</p>
    <input id="pc" type="password" inputmode="text" placeholder="passcode" autocomplete="current-password">
    <button class="btn go" style="width:100%" onclick="doLogin()">Enter</button>
    <div id="loginerr" style="color:var(--bad);font-size:13px;margin-top:12px;min-height:18px"></div>
  </div>
</div>

<div class="lock hidden" id="lock">
  <div class="lbox">
    <div class="brand"><span class="dot"></span>Cortex</div>
    <p id="lockmsg">Enter your PIN</p>
    <div class="pindots" id="pindots"></div>
    <div class="keypad" id="keypad"></div>

<script>
// ---- config ----
const API = localStorage.getItem('cortex_api') || (location.hostname.match(/^(localhost|127|192|file)/)||location.protocol==='file:' ? '' : '');
let token = localStorage.getItem('cortex_token') || '';
let tab = 'talk', companies = [], skills = {}, demo = false;
const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent||'');  // auto re-lock on mobile only

// ---- sample data (graceful fallback so the cockpit is explorable offline) ----
const SAMPLE = {
  companies:[{slug:'tabscanner',name:'Tabscanner',north_star:'Enterprise / sales-qualified leads'},
             {slug:'sensa',name:'Sensa',north_star:'Qualified inquiries'}],
  skills:{tabscanner:[{skill_key:'content-seo',name:'Content & SEO',authority:'ask',trust_streak:1,stakes:'low'}],
          sensa:[{skill_key:'content-seo',name:'Content & SEO',authority:'ask',trust_streak:0,stakes:'low'}]},
  inbox:[{id:42,kind:'blog',company:'Tabscanner',skill:'Content & SEO',
    title:'How Receipt OCR Accuracy Is Measured',
    body:'Accuracy in receipt OCR is not one number. Field-level accuracy asks: did we get the merchant, date and total exactly right? Character-level accuracy is more forgiving...\n\nWhy it matters for expense and fintech apps, and what to ask a vendor before you commit.'}],
  decisions:[{task_id:42,action:'correct',actor:'owner',note:'Lead with the cost angle'},
             {task_id:38,action:'publish',actor:'owner',note:null},
             {task_id:35,action:'auto',actor:'cortex',note:null},
             {task_id:31,action:'reject',actor:'owner',note:null}]
};

// ---- api helper ----
async function api(path, opts={}){
  if(demo) throw new Error('demo');
  const r = await fetch(API+path, {...opts, headers:{'Content-Type':'application/json',
    ...(token?{Authorization:'Bearer '+token}:{}), ...(opts.headers||{})}});
  if(r.status===401){ logout(); throw new Error('auth'); }
  if(!r.ok){ throw new Error((await r.json().catch(()=>({}))).detail || r.status); }
  return r.status===204?null:r.json();
}

// ---- auth ----
async function doLogin(){
  const pc = document.getElementById('pc').value.trim();
  const err = document.getElementById('loginerr'); err.textContent='';
  if(pc==='demo'){ demo=true; afterLogin(); return; }
  try{
    const d = await api('/api/login',{method:'POST',body:JSON.stringify({passcode:pc})});
    token = d.token; localStorage.setItem('cortex_token',token); afterLogin();
  }catch(e){ err.textContent = e.message==='wrong passcode'?'Wrong passcode':'Could not reach Cortex ('+e.message+'). Tip: passcode "demo" to explore.'; }
}
function logout(){ token=''; localStorage.removeItem('cortex_token'); document.getElementById('login').classList.remove('hidden'); }
function afterLogin(){ document.getElementById('login').classList.add('hidden');
  document.getElementById('demoBanner').classList.toggle('hidden',!demo);
  if(demo){ enterUnlocked(); return; }
  lockBoot(); }

// ---- app lock (4-digit PIN, server-verified + biometric gate) ----
let pinSet=false, booted=false, lockMode='unlock', pinBuf='', pinFirst='', hidAt=0;
const bioId=()=>localStorage.getItem('cortex_bio');
function _b64ToBuf(b){ b=b.replace(/-/g,'+').replace(/_/g,'/'); const s=atob(b); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a.buffer; }
function _bufToB64(buf){ const a=new Uint8Array(buf); let s=''; a.forEach(b=>s+=String.fromCharCode(b)); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function _rand(n){ const a=new Uint8Array(n); crypto.getRandomValues(a); return a; }
function enterUnlocked(){ document.getElementById('lock').classList.add('hidden'); if(!booted){ booted=true; boot(); } }
async function lockBoot(){
  try{ const s=await api('/api/lock/status'); pinSet=!!s.pin_set; }catch(e){ pinSet=false; }
  lockMode = pinSet?'unlock':'set'; pinBuf=''; pinFirst='';
  showLock(pinSet?'Enter your PIN':'Set a 4-digit PIN');
}
function showLock(msg){
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('lockmsg').textContent=msg;
  document.getElementById('lockerr').textContent=''; renderDots(); renderKeypad();
  if(lockMode==='unlock' && bioId()) setTimeout(bioUnlock,350);
}
function renderDots(){ let h=''; for(let i=0;i<4;i++) h+=`<span class="pd ${i<pinBuf.length?'on':''}"></span>`; document.getElementById('pindots').innerHTML=h; }
function renderKeypad(){
  const bio = bioId() && lockMode==='unlock';
  const keys=['1','2','3','4','5','6','7','8','9', bio?'bio':'ghost','0','del'];
  document.getElementById('keypad').innerHTML=keys.map(k=>{
    if(k==='del') return `<button class="kp" onclick="pinKey('del')" aria-label="Delete">${ic('back',24)}</button>`;
    if(k==='ghost') return `<button class="kp ghost"></button>`;
    if(k==='bio') return `<button class="kp" onclick="bioUnlock()" aria-label="Unlock with fingerprint">${ic('finger',26)}</button>`;
    return `<button class="kp" onclick="pinKey('${k}')">${k}</button>`;
  }).join('');
}
function pinKey(k){
  if(k==='del'){ pinBuf=pinBuf.slice(0,-1); renderDots(); return; }
  if(pinBuf.length>=4) return;
  pinBuf+=k; renderDots();
  if(pinBuf.length===4) setTimeout(pinSubmit,140);
}
async function pinSubmit(){
  const pin=pinBuf, msg=document.getElementById('lockmsg'), err=document.getElementById('lockerr');
  if(lockMode==='set'){
    if(!pinFirst){ pinFirst=pin; pinBuf=''; msg.textContent='Confirm your PIN'; renderDots(); return; }
    if(pin!==pinFirst){ err.textContent='Didn’t match — start again'; pinFirst=''; pinBuf=''; msg.textContent='Set a 4-digit PIN'; renderDots(); return; }
    try{ await api('/api/lock/set',{method:'POST',body:JSON.stringify({pin})}); pinSet=true; enterUnlocked(); setTimeout(offerBiometric,500); }
    catch(e){ err.textContent='Error: '+e.message; pinBuf=''; renderDots(); }
    return;
  }
  try{ const r=await api('/api/lock/check',{method:'POST',body:JSON.stringify({pin})});
    if(r.ok) enterUnlocked(); else { err.textContent='Wrong PIN'; pinBuf=''; renderDots(); }
  }catch(e){ err.textContent='Error: '+e.message; pinBuf=''; renderDots(); }
}
async function offerBiometric(){
  if(!window.PublicKeyCredential) return;
  let ok=false; try{ ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }catch(e){}
  if(!ok || !confirm('Enable Face ID / fingerprint to unlock Cortex?')) return;
  try{
    const cred=await navigator.credentials.create({publicKey:{
      challenge:_rand(32), rp:{name:'Cortex', id:location.hostname},
      user:{id:_rand(16), name:'cortex', displayName:'Cortex Operator'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform', userVerification:'required'},
      timeout:60000, attestation:'none'}});
    localStorage.setItem('cortex_bio', _bufToB64(cred.rawId)); toast('Biometric unlock enabled ✓');
  }catch(e){ toast('Skipped biometric'); }
}
async function bioUnlock(){
  const id=bioId(); if(!id) return;
  try{ await navigator.credentials.get({publicKey:{
      challenge:_rand(32), rpId:location.hostname,
      allowCredentials:[{type:'public-key', id:_b64ToBuf(id)}], userVerification:'required', timeout:60000}});
    enterUnlocked();
  }catch(e){ /* fall back to the PIN pad */ }
}
function lockNow(){ if(pinSet && !demo){ pinBuf=''; lockMode='unlock'; showLock('Enter your PIN'); } }

async function boot(){
  try{ companies = demo?SAMPLE.companies:await api('/api/companies'); }
  catch(e){ demo=true; document.getElementById('demoBanner').classList.remove('hidden'); companies=SAMPLE.companies; }
  const sel=document.getElementById('coSel'); sel.innerHTML='<option value="">All companies</option>'+
    companies.map(c=>`<option value="${c.slug}">${c.name}</option>`).join('');
  // remember the last company; default to Tabscanner the first time
  let savedCo=localStorage.getItem('cortex_company'); if(savedCo===null) savedCo='tabscanner';
  if([...sel.options].some(o=>o.value===savedCo)) sel.value=savedCo;
  // default to the Talk tab with a clean NEW chat (old chats via the dropdown)
  tab='talk'; chatMsgs=[]; currentConvId=null; currentConvTitle=''; routedTo=''; localStorage.removeItem('cortex_conv');
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t==='talk'));
  render();
}

function ic(n,s){ s=s||20; return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:middle"><path d="${ICON[n]||''}"></path></svg>`; }

// ---- CRM pages: Contacts / Projects / Opportunities ----
const STAGECOL={Cold:'#8597A6',Contacted:'#5B8DEF',Engaged:'#00DAFF',Qualified:'#2ad17e',Opportunity:'#ffb020',Quote:'#ffb020','Not interested':'#ff5d6c','Dormant/dead':'#8597A6',Booked:'#00DAFF',Production:'#ffb020',Delivered:'#5B8DEF','Final Payment':'#ffb020','Close & review':'#2ad17e',Lost:'#ff5d6c'};
function stageChip(s){ s=s||'Cold'; const c=STAGECOL[s]||'#8597A6'; return `<span class="chip" style="color:${c};border-color:${c}55;background:transparent">${esc(s)}</span>`; }

function initials(s){ const m=(s||'').match(/[A-Za-z]/g)||['?']; return (m[0]+(m[1]||'')).toUpperCase(); }

const PROJ_STAGES=['Opportunity','Quote','Booked','Production','Delivered','Final Payment','Close & review','Lost'];
const FORECAST_STAGES=['Opportunity','Quote'];
const CONTACT_STAGES=['Cold','Contacted','Engaged','Qualified','Not interested','Dormant/dead'];
function contactStagePicker(c){
  return `<div class="dsec"><div class="dlbl">Status</div><div class="chiprow">${CONTACT_STAGES.map((s,i)=>{
    const on=s===c.stage, col=STAGECOL[s]||'#8597A6';
    return `<span class="fchip${on?' on':''}" style="${on?`color:${col};border-color:${col}`:''}" onclick="setContactStage('${esc(c.email)}',${i})">${esc(s)}</span>`;
  }).join('')}</div></div>`;
}
async function setContactStage(email,i){
  const s=CONTACT_STAGES[i];
  try{ await api('/api/crm/contact/stage',{method:'POST',body:JSON.stringify({email,stage:s})}); toast('Status: '+s); openContact(email); }
  catch(e){ toast('Could not update ('+e.message+')'); }
}
function noteBox(kind,id){
  const tid='note_'+kind+'_'+(''+id).replace(/[^a-zA-Z0-9]/g,'');
  return `<div class="dsec"><div class="dlbl">Add a note</div>
    <textarea id="${tid}" rows="2" class="nta" placeholder="Type, or tap the mic to speak…"></textarea>
    <div class="row" style="margin-top:7px">
      <button class="btn warn sm" onclick="dictate(this,'${tid}')">${ic('mic',15)} Tap to talk</button>
      <button class="btn go sm" onclick="saveNote('${kind}','${esc(String(id))}','${tid}')">Save note</button>
    </div></div>`;
}
async function saveNote(kind,id,tid){
  const ta=document.getElementById(tid), text=(ta&&ta.value||'').trim();
  if(!text){ toast('Type or speak a note first'); return; }
  if(recording) stopDictation(document.querySelector('.btn.warn.rec'));
  try{
    if(kind==='c') await api('/api/crm/contact/note',{method:'POST',body:JSON.stringify({email:id,note:text})});
    else if(kind==='a') await api('/api/crm/account/'+id+'/note',{method:'POST',body:JSON.stringify({note:text})});
    else await api('/api/crm/project/'+id+'/note',{method:'POST',body:JSON.stringify({note:text})});
    toast('Note saved'); if(kind==='c') openContact(id); else if(kind==='a') openAccount(+id); else openProject(+id);
  }catch(e){ toast('Could not save ('+e.message+')'); }
}
function projStagePicker(p){
  return `<div class="dsec"><div class="dlbl">Change stage</div><div class="chiprow">${PROJ_STAGES.map((s,i)=>{
    const on=s===p.stage, c=STAGECOL[s]||'#8597A6';
    return `<span class="fchip${on?' on':''}" style="${on?`color:${c};border-color:${c}`:''}" onclick="setProjStage(${p.id},${i})">${esc(s)}</span>`;
  }).join('')}</div></div>`;
}
async function setProjStage(id,i){
  const s=PROJ_STAGES[i];
  try{ await api('/api/crm/project/'+id+'/stage',{method:'POST',body:JSON.stringify({stage:s})}); toast('Moved to '+s); openProject(id); }
  catch(e){ toast('Could not update ('+e.message+')'); }
}
function dealContacts(p){
  const list=(p.contacts&&p.contacts.length)?p.contacts:(p.contact_email?[{email:p.contact_email,name:'',primary:true}]:[]);
  const rows=list.map(c=>{ const nm=c.name||c.email;
    return `<div class="crow" style="padding:7px 0;cursor:pointer" onclick="openContact('${esc(c.email)}')">
      <div class="cav" style="width:30px;height:30px;font-size:11px">${esc(initials(nm))}</div>
      <div style="flex:1;min-width:0"><div class="cname" style="font-size:14px">${esc(nm)}${c.primary?' <span class="chip cy" style="font-size:10px">primary</span>':''}</div>
        <div class="csub">${esc(c.email)}${c.role?' · '+esc(c.role):''}</div></div>
      <div class="row" style="gap:4px;flex:none" onclick="event.stopPropagation()">
        ${c.primary?'':`<button class="iconbtn sm" title="Make primary" onclick="dealPrimary(${p.id},'${esc(c.email)}')">${ic('check',15)}</button>`}
        <button class="iconbtn sm" title="Unlink" onclick="dealRemoveContact(${p.id},'${esc(c.email)}')">${ic('x',15)}</button>

async function dealAddContact(id){

}
async function dealPrimary(id,email){ try{ await api('/api/crm/project/'+id+'/contacts/primary',{method:'POST',body:JSON.stringify({email})}); toast('Primary set'); openProject(id); }catch(e){ toast(e.message); } }
async function dealRemoveContact(id,email){ try{ await api('/api/crm/project/'+id+'/contacts?email='+encodeURIComponent(email),{method:'DELETE'}); toast('Unlinked'); openProject(id); }catch(e){ toast(e.message); } }

const dmoney=n=>Math.round(n||0).toLocaleString();
function byCompany(rows){ const g={}; rows.forEach(r=>{ const k=r.company||'Other'; (g[k]=g[k]||[]).push(r); }); return g; }
function dealCard(x){
  return `<div class="card prow" style="cursor:pointer" onclick="openProject(${x.id})"><div style="flex:1;min-width:0"><div class="cname">${esc(x.title||'Untitled')}</div><div class="csub">${esc(x.company||'')}</div></div><div style="text-align:right"><div class="pval">${x.value?dmoney(x.value):'<span style="color:var(--mut)">no value yet</span>'}</div>${stageChip(x.stage)}</div></div>`;
}
async function renderProjects(b,co){
  let d; try{ d=await api('/api/crm/projects?company='+encodeURIComponent(co||'all')); }catch(e){ d={projects:[],groups:{},total_value:0,count:0}; }
  const allco=!co;
  let h=`<div class="mrow"><div class="mcard"><div class="ml">Pipeline value</div><div class="mv">${(d.total_value/1e6).toFixed(2)}M <span style="font-size:12px;color:var(--mut)">AED</span></div></div>
    <div class="mcard"><div class="ml">Active projects</div><div class="mv">${d.count}</div></div></div>`;
  if(!d.count){ h+='<div class="empty">No projects yet</div>'; }
  else if(allco){ const g=byCompany(d.projects); Object.keys(g).sort().forEach(cn=>{ const it=g[cn], s=it.reduce((a,p)=>a+(+p.value||0),0);
    h+=`<div class="h">${esc(cn)} · ${it.length} · ${dmoney(s)}</div>`+it.map(dealCard).join(''); }); }
  else { ['Booked','Production','Delivered','Final Payment','Close & review'].forEach(st=>{ const g=d.groups[st]; if(!g) return;
    h+=`<div class="h">${esc(st)} · ${g.n} · ${dmoney(g.value)}</div>`+d.projects.filter(p=>p.stage===st).map(dealCard).join(''); }); }
  b.outerHTML='<div id="crmbody">'+h+'</div>';
}
async function renderOpps(b,co){
  let d; try{ d=await api('/api/crm/opportunities?company='+encodeURIComponent(co||'all')); }catch(e){ d={opportunities:[],lost:[],total_value:0,count:0}; }
  const allco=!co;
  let h=`<div class="mrow"><div class="mcard"><div class="ml">Forecast value</div><div class="mv">${(d.total_value/1e6).toFixed(2)}M <span style="font-size:12px;color:var(--mut)">AED</span></div></div>
    <div class="mcard"><div class="ml">Open opportunities</div><div class="mv">${d.count}</div></div></div>`;
  if(!d.opportunities.length){ h+='<div class="empty">No open opportunities</div>'; }
  else if(allco){ const g=byCompany(d.opportunities); Object.keys(g).sort().forEach(cn=>{ const it=g[cn], s=it.reduce((a,o)=>a+(+o.value||0),0);
    h+=`<div class="h">${esc(cn)} · ${it.length}${s?' · '+dmoney(s):''}</div>`+it.map(dealCard).join(''); }); }
  else { h+='<div class="h">In the pipeline</div>'+d.opportunities.map(dealCard).join(''); }
  if(d.lost&&d.lost.length){ h+=`<div class="h" style="color:var(--mut)">Lost · ${d.lost.length}</div><div style="opacity:.55">`+d.lost.map(dealCard).join('')+'</div>'; }
  b.outerHTML='<div id="crmbody">'+h+'</div>';

async function renameAccount(id,cur){

const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let schedCompanies={}, schedKinds={};
function pad2(n){ return String(n||0).padStart(2,'0'); }
function cadenceText(t){
  if(t.cadence==='daily')   return `Daily · ${pad2(t.hour)}:${pad2(t.minute)}`;
  if(t.cadence==='monthly') return `Monthly · ${pad2(t.hour)}:${pad2(t.minute)}`;
  return `Weekly · ${DOW[t.weekday||0]} ${pad2(t.hour)}:${pad2(t.minute)}`;
}
function whenText(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleString([],{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
async function renderCalendar(v){
  v.innerHTML=`<div class="h">Calendar</div><div id="calbody" class="empty">Loading…</div>`;
  let d; try{ d=await api('/api/schedule'); }catch(e){ d={tasks:[],kinds:{},companies:{}}; }
  schedCompanies=d.companies||{}; schedKinds=d.kinds||{};
  const cos=Object.entries(schedCompanies), tasks=d.tasks||[];
  let h='';
  if(tasks.length){
    h+='<div class="h">Scheduled</div>';
    tasks.forEach(t=>{
      h+=`<div class="card prow" style="${t.enabled?'':'opacity:.55'}"><div style="flex:1;min-width:0">
        <div class="cname">${esc(t.title||'Task')}</div>
        <div class="csub">${esc(cadenceText(t))} · next ${esc(whenText(t.next_run))}${t.last_status?' · last: '+esc(t.last_status):''}</div></div>
        <div class="row" style="gap:6px;flex:none">
          <button class="iconbtn sm" title="Run now" onclick="runSched(${t.id})">${ic('play',15)}</button>
          <button class="iconbtn sm" title="${t.enabled?'Pause':'Resume'}" onclick="toggleSched(${t.id})">${ic(t.enabled?'pause':'play',15)}</button>
          <button class="iconbtn sm" title="Delete" onclick="delSched(${t.id})">${ic('trash',15)}</button>
        </div></div>`;
    });
  } else { h+='<div class="empty" style="padding:22px 14px">No scheduled tasks yet. Add one below.</div>'; }
  h+=`<div class="h">Schedule a task</div><div class="card">
    <label>Company</label>
    <select id="scCo" class="fsel">${cos.map(([s,l])=>`<option value="${esc(s)}">${esc(l)}</option>`).join('')}</select>
    <label>Task</label>
    <select id="scKind" class="fsel">${Object.entries(schedKinds).map(([k,l])=>`<option value="${esc(k)}">${esc(l)}</option>`).join('')}</select>
    <label>How often</label>
    <select id="scCad" class="fsel" onchange="document.getElementById('scDowWrap').style.display=this.value==='weekly'?'block':'none'">
      <option value="weekly">Weekly</option><option value="daily">Daily</option><option value="monthly">Monthly</option></select>
    <div id="scDowWrap"><label>Day</label>
      <select id="scDow" class="fsel">${DOW.map((d2,i)=>`<option value="${i}"${i===0?' selected':''}>${d2}</option>`).join('')}</select></div>
    <label>Time</label>
    <input id="scTime" class="fsel" type="time" value="08:00">
    <div class="row" style="margin-top:14px">
      <button class="btn go" onclick="addSched()">${ic('plus',16)} Schedule it</button>
      <button class="btn" onclick="runReportNow()">${ic('file',16)} Generate one now</button>
    </div></div>`;
  document.getElementById('calbody').outerHTML='<div id="calbody">'+h+'</div>';
}
function fval(id){ const e=document.getElementById(id); return e?e.value:''; }
async function addSched(){
  const [hh,mm]=(fval('scTime')||'08:00').split(':').map(Number);
  try{ await api('/api/schedule',{method:'POST',body:JSON.stringify({company:fval('scCo'),kind:fval('scKind'),
        cadence:fval('scCad'),weekday:parseInt(fval('scDow')||'0',10),hour:hh,minute:mm})});
    toast('Scheduled'); renderCalendar(document.getElementById('view')); }
  catch(e){ toast('Could not schedule ('+e.message+')'); }
}
async function toggleSched(id){ try{ await api('/api/schedule/'+id+'/toggle',{method:'POST'}); renderCalendar(document.getElementById('view')); }catch(e){ toast(e.message); } }
async function delSched(id){ try{ await api('/api/schedule/'+id,{method:'DELETE'}); renderCalendar(document.getElementById('view')); }catch(e){ toast(e.message); } }
async function runSched(id){ try{ toast('Running…'); await api('/api/schedule/'+id+'/run',{method:'POST'}); toast('Done — it is in your Inbox'); }catch(e){ toast('Failed: '+e.message); } }
async function runReportNow(){ try{ toast('Generating…'); await api('/api/report/run?company='+encodeURIComponent(fval('scCo')),{method:'POST'}); toast('Done — check your Inbox'); }catch(e){ toast('Failed: '+e.message); } }

// ---- voice: live streaming dictation (Deepgram WS) + read aloud (ElevenLabs) ----
let recording=false, starting=false, audioEl=null, actx=null;
let vws=null, vctx=null, vsrc=null, vproc=null, vmute=null, vstream=null, vfinal='', dictTarget='aBrief';
function ensureAudio(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function beep(kind){
  try{
    ensureAudio(); if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain(); o.connect(g); g.connect(actx.destination);
    const t=actx.currentTime, dur=(kind==='start'?0.20:0.24);
    if(kind==='start'){ o.frequency.setValueAtTime(660,t); o.frequency.setValueAtTime(990,t+0.08); }   // rising "go"
    else { o.frequency.setValueAtTime(560,t); o.frequency.setValueAtTime(370,t+0.10); }                 // falling "done"
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
async function dictate(btn, targetId){
  if(demo){ toast('Voice needs the live app (log in with your passcode)'); return; }
  if(recording){ stopDictation(btn); return; }
  if(starting) return;
  if(freeOn) freeStop();
  dictTarget=targetId||'aBrief';
  ensureAudio();  // unlock audio on this tap (needed on iOS)
  btn.dataset.idle = btn.dataset.idle || btn.innerHTML;
  starting=true; btn.classList.add('rec'); btn.innerHTML='…';
  const ta0=document.getElementById(dictTarget); vfinal=(ta0&&ta0.value)?ta0.value.trim():'';
  let readyFired=false;
  const goReady=()=>{ if(readyFired||!starting) return; readyFired=true; starting=false; recording=true;
    btn.innerHTML=ic('stop',18); beep('start'); toast('Speak now — words appear as you talk'); };
  try{
    vstream=await navigator.mediaDevices.getUserMedia({audio:true});
    vctx=new (window.AudioContext||window.webkitAudioContext)();
    if(vctx.state==='suspended') await vctx.resume();
    const rate=Math.round(vctx.sampleRate);
    const proto=location.protocol==='https:'?'wss':'ws';
    vws=new WebSocket(`${proto}://${location.host}/api/voice/stream?token=${encodeURIComponent(token)}&rate=${rate}`);
    vws.binaryType='arraybuffer';
    vws.onopen=()=>{
      vsrc=vctx.createMediaStreamSource(vstream);
      vproc=vctx.createScriptProcessor(4096,1,1);
      vproc.onaudioprocess=e=>{
        if(!vws||vws.readyState!==1) return;
        const f=e.inputBuffer.getChannelData(0), n=f.length, i16=new Int16Array(n);
        for(let i=0;i<n;i++){ let s=Math.max(-1,Math.min(1,f[i])); i16[i]=s<0?s*0x8000:s*0x7FFF; }
        vws.send(i16.buffer);
      };
      vmute=vctx.createGain(); vmute.gain.value=0;
      vsrc.connect(vproc); vproc.connect(vmute); vmute.connect(vctx.destination);
      setTimeout(goReady,180);
    };
    vws.onmessage=ev=>{
      let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
      if(d.error){ toast('Voice: '+d.error); return; }
      if(!d.text) return;   // push-to-talk ends on Stop, so ignore utterance_end here
      const t=document.getElementById(dictTarget); if(!t) return;
      if(d.final){ vfinal=(vfinal?vfinal+' ':'')+d.text; t.value=vfinal; }
      else { t.value=(vfinal?vfinal+' ':'')+d.text; }   // live interim, replaced as you speak
    };
    vws.onerror=()=>{ toast('Voice stream error'); };
    setTimeout(goReady,1500);  // fallback if onopen is slow
  }catch(e){ starting=false; recording=false; btn.classList.remove('rec'); btn.innerHTML=btn.dataset.idle||ic('mic',18); toast('Mic blocked: '+(e.message||e)); }
}
function stopDictation(btn){
  recording=false; starting=false; beep('stop'); toast('Done');
  try{ if(vproc){ vproc.onaudioprocess=null; vproc.disconnect(); } }catch(e){}
  try{ if(vsrc) vsrc.disconnect(); }catch(e){}
  try{ if(vmute) vmute.disconnect(); }catch(e){}
  try{ if(vstream) vstream.getTracks().forEach(t=>t.stop()); }catch(e){}
  const w=vws, c=vctx;
  setTimeout(()=>{ try{ if(w&&w.readyState===1) w.close(); }catch(e){} try{ if(c) c.close(); }catch(e){} }, 400); // grace for the final words
  vws=null;vsrc=null;vproc=null;vmute=null;vstream=null;vctx=null;
  if(btn){ btn.classList.remove('rec'); btn.innerHTML=btn.dataset.idle||ic('mic',18); }
}
async function speak(text){
  if(demo){ toast('Voice needs the live app'); return; }
  text=(text||'').trim(); if(!text) return;
  toast('Speaking…');
  try{
    const r=await fetch(API+'/api/voice/tts',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({text})});
    if(!r.ok) throw new Error(r.status);
    const blob=await r.blob();
    if(audioEl){ try{ audioEl.pause(); }catch(e){} }
    audioEl=new Audio(URL.createObjectURL(blob)); audioEl.play();
  }catch(e){ toast('Speak failed: '+e.message); }
}

async function sendChat(text, viaVoice){
  const inp=document.getElementById('chatIn');
  let msg=(text!=null?text:(inp?inp.value:'')).trim();
  // On-the-go: tapping Send folds the gathered voice buffer in, ends the mic session, speaks the reply.
  if(text==null && freeOn && voiceMode==='go'){
    const u=(freeUtt||freeLive||'').trim(); if(u) msg=(msg?msg+' ':'')+u;
    viaVoice=true; freeStop();
  }
  const imgs=pendingImages.slice(); pendingImages=[]; paintAttach();
  if(!msg && !imgs.length) return '';
  if(inp&&text==null) inp.value='';
  chatMsgs.push({role:'user',content:msg||(imgs.length?'(image)':''),images:imgs});
  chatMsgs.push({role:'assistant',content:'…'}); paintChat();
  if(demo){ chatMsgs[chatMsgs.length-1]={role:'assistant',content:'(demo) Log in with your passcode to chat for real.'}; paintChat(); return ''; }
  try{
    const hist=chatMsgs.filter(m=>m.content!=='…').map(m=>({role:m.role,content:m.content}));
    const fco=(document.getElementById('coSel')||{}).value||'';
    const payload={messages:hist,persona:talkingTo,company:fco};
    if(imgs.length) payload.images=imgs;        // attached photos/files -> Cortex sees them
    if(!talkingTo) payload.current=routedTo;   // sticky auto-routing
    const d=await api('/api/chat',{method:'POST',body:JSON.stringify(payload)});
    const reply=d.reply||'(no reply)';
    const pk=talkingTo||d.persona||'';
    if(!talkingTo) routedTo=d.persona||'';     // remember who the concierge routed to
    chatMsgs[chatMsgs.length-1]={role:'assistant',content:reply,who:d.persona_label||'Cortex',pk}; paintChat();
    saveConv();
    if(viaVoice && reply) await speakAndWait(reply);
    return reply;
  }catch(e){ chatMsgs[chatMsgs.length-1]={role:'assistant',content:'Error: '+e.message}; paintChat(); return ''; }
}
function speakAndWait(text){
  return new Promise(async(resolve)=>{
    try{
      botSpeaking=true;
      const r=await fetch(API+'/api/voice/tts',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({text})});
      if(!r.ok){ botSpeaking=false; return resolve(); }
      const blob=await r.blob();
      if(audioEl){ try{audioEl.pause();}catch(e){} }
      audioEl=new Audio(URL.createObjectURL(blob));
      let settled=false; const done=()=>{ if(settled) return; settled=true; botSpeaking=false; resolve(); };
      audioEl.onended=done; audioEl.onerror=done; audioEl.onpause=done;   // pause = barge-in interrupt
      audioEl.play().catch(done);
    }catch(e){ botSpeaking=false; resolve(); }
  });
}
async function toggleFree(mode, onTurn){
  if(freeOn){ freeStop(); return; }
  if(demo){ toast('Voice chat needs the live app'); return; }
  if(recording||starting){ stopDictation(document.getElementById('chatMic')); }
  voiceMode = (mode==='go')?'go':'free';
  turnFn = onTurn || null;   // null => chat (freeTurn); set => questionnaire etc.
  ensureAudio(); requestWake();
  freeOn=true; freeUtt=''; freeLive=''; goPaused=false;
  setVoiceButtons(); updateLivePanel();
  const hint=document.getElementById('freehint'); if(hint){ hint.textContent='warming up…'; hint.classList.add('on'); }
  let ready=false;
  const goReady=()=>{ if(ready||!freeOn) return; ready=true; setHint(voiceMode==='go'?'On-the-go — talk, then push to stop':'Listening — just talk'); beep('start'); updateLivePanel(); };
  try{
    vstream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    vctx=new (window.AudioContext||window.webkitAudioContext)();
    if(vctx.state==='suspended') await vctx.resume();
    const rate=Math.round(vctx.sampleRate);
    const proto=location.protocol==='https:'?'wss':'ws';
    vws=new WebSocket(`${proto}://${location.host}/api/voice/stream?token=${encodeURIComponent(token)}&rate=${rate}`);
    vws.binaryType='arraybuffer';
    vws.onopen=()=>{
      vsrc=vctx.createMediaStreamSource(vstream);
      vproc=vctx.createScriptProcessor(4096,1,1);
      vproc.onaudioprocess=e=>{
        if(!vws||vws.readyState!==1) return;
        const f=e.inputBuffer.getChannelData(0), n=f.length, i16=new Int16Array(n);
        for(let i=0;i<n;i++){ let s=Math.max(-1,Math.min(1,f[i])); i16[i]=s<0?s*0x8000:s*0x7FFF; }
        vws.send(i16.buffer);   // always send real audio (AEC cancels Cortex's own voice) -> enables barge-in
      };
      vmute=vctx.createGain(); vmute.gain.value=0;
      vsrc.connect(vproc); vproc.connect(vmute); vmute.connect(vctx.destination);
      setTimeout(goReady,250);
    };
    vws.onmessage=ev=>{
      let d; try{ d=JSON.parse(ev.data);}catch(e){return;}
      if(d.error){ toast('Voice: '+d.error); return; }
      if(botSpeaking){   // barge-in: talk over Cortex (>=3 words past AEC) and it stops + listens
        if(d.text && d.text.trim().split(/\s+/).length>=3){ interruptSpeech(); }
        return;
      }
      if(freeThinking) return;
      if(voiceMode==='go' && goPaused) return;   // On-the-go paused: ignore speech while you think
      if(d.text){
        if(d.final){ freeUtt=(freeUtt?freeUtt+' ':'')+d.text; }
        freeLive = d.final ? freeUtt : ((freeUtt?freeUtt+' ':'')+d.text);   // show words live
        updateLivePanel();   // anchored transcript, auto-scrolls to the latest words
        if(voiceMode==='free') armTurn();   // Free auto-ends a turn on silence; On-the-go waits for your push
      }
    };
    vws.onerror=()=>{ toast('Voice stream error'); };
    setTimeout(goReady,1500);  // fallback if onopen is slow
  }catch(e){ freeOn=false; setVoiceButtons(); updateLivePanel(); toast('Mic blocked: '+(e.message||e)); }
}
async function freeTurn(utterance){
  freeThinking=true; beep('stop'); setHint('thinking…'); freeLive=''; updateLivePanel();   // handover: my turn
  const reply=await sendChat(utterance, false);
  if(reply && freeOn){ bargeInterrupted=false; setHint('speaking… (talk to cut in)'); await speakAndWait(reply); }
  freeThinking=false;
  if(freeOn && !bargeInterrupted){
    if(voiceMode==='go'){ freeStop(); }                                  // On-the-go: one push = one turn
    else { beep('start'); setHint('Listening — just talk'); }            // Free: auto-listen for your next turn
  }
  bargeInterrupted=false;
}
function freeStop(){
  freeOn=false; botSpeaking=false; freeThinking=false; freeLive=''; freeUtt=''; turnFn=null; clearTimeout(freeTimer);
  setVoiceButtons();
  const hint=document.getElementById('freehint'); if(hint) hint.classList.remove('on');
  try{ if(audioEl) audioEl.pause(); }catch(e){}
  try{ if(vproc){vproc.onaudioprocess=null;vproc.disconnect();} }catch(e){}
  try{ if(vsrc) vsrc.disconnect(); }catch(e){}
  try{ if(vmute) vmute.disconnect(); }catch(e){}
  try{ if(vstream) vstream.getTracks().forEach(t=>t.stop()); }catch(e){}
  try{ if(vws&&vws.readyState===1) vws.close(); }catch(e){}
  try{ if(vctx) vctx.close(); }catch(e){}
  vws=null;vctx=null;vsrc=null;vproc=null;vmute=null;vstream=null;
  updateLivePanel(); paintChat(); syncWake();
}

function decideQuestion(skillKey,qi,mode){
  const box=document.getElementById('dec_'+skillKey+'_'+qi); if(!box) return;
  if(box.style.display!=='none' && box.dataset.mode===mode){ box.style.display='none'; return; }
  box.dataset.mode=mode; box.style.display='block';
  const taid='dq_'+skillKey+'_'+qi;
  const ph=mode==='lock'?'The rule to bake into this skill — say or type it…':'The idea to park for later…';
  box.innerHTML=`<textarea id="${taid}" rows="2" placeholder="${ph}" style="width:100%;box-sizing:border-box;background:var(--bg2,#0e1620);color:var(--fg,#dfe7ef);border:1px solid var(--ln,#22303f);border-radius:10px;padding:8px 10px;font:inherit;font-size:13.5px"></textarea>
    <div class="row" style="margin-top:6px">
      <button class="btn warn" onclick="event.stopPropagation();dictate(this,'${taid}')">${ic('mic',15)} Tap to talk</button>
      <button class="btn go" onclick="event.stopPropagation();saveDecision('${skillKey}',${qi},'${mode}')">${mode==='lock'?'Lock in as rule':'Park idea'}</button>
      <button class="btn" onclick="event.stopPropagation();this.closest('[id^=dec_]').style.display='none'">Cancel</button>
    </div>`;
}
async function saveDecision(skillKey,qi,mode){
  if(recording) stopDictation(null);
  const ta=document.getElementById('dq_'+skillKey+'_'+qi), text=(ta&&ta.value||'').trim();
  if(!text){ toast('Say or type it first'); return; }
  const co=(document.getElementById('coSel')||{}).value||'';
  const qa=qaCache[skillKey], q=((qa&&qa.questions)||[])[qi]||{};
  if(demo){ toast('Saved (demo)'); return; }
  try{
    if(mode==='lock') await api(`/api/skills/${encodeURIComponent(skillKey)}/questionnaire/lock`,{method:'POST',body:JSON.stringify({company:co,q_idx:qi,rule:text})});
    else await api(`/api/skills/${encodeURIComponent(skillKey)}/questionnaire/park`,{method:'POST',body:JSON.stringify({company:co,q_idx:qi,idea:text,question:q.q||''})});
    toast(mode==='lock'?'Locked in as a rule ✓':'Parked to ideas ✓');
    qaCache[skillKey]=await api(`/api/skills/${encodeURIComponent(skillKey)}/questionnaire?company=${encodeURIComponent(co)}`);
    try{ skillsData=await api(`/api/companies/${co}/skills`); }catch(e){}
    paintSkills();
  }catch(e){ toast('Error: '+e.message); }
}
async function addRule(id){
  const inp=document.getElementById('nr'+id), rule=(inp?inp.value:'').trim(); if(!rule) return;
  const scope=(document.getElementById('rs'+id)||{}).value||'company';
  if(demo){ toast('Rule added (demo)'); return; }
  try{ const sk=await api(`/api/skills/${id}/rule`,{method:'POST',body:JSON.stringify({rule,scope})});
    const i=skillsData.findIndex(s=>s.id===id); if(i>=0) skillsData[i]=sk;
    toast(scope==='universal'?'Universal rule added ✓':'Rule added ✓'); paintSkills(); }
  catch(e){ toast('Error: '+e.message); }
}
async function delRule(id,index,scope){
  if(demo){ toast('Removed (demo)'); return; }
  try{ const sk=await api(`/api/skills/${id}/rule/delete`,{method:'POST',body:JSON.stringify({index,scope:scope||'company'})});
    const i=skillsData.findIndex(s=>s.id===id); if(i>=0) skillsData[i]=sk; toast('Rule removed'); paintSkills(); }
  catch(e){ toast('Error: '+e.message); }
}

// ---- Manager questionnaire (guided flow) ----
let qz={area:null,manager:'',company:'',tier:null,run:null,state:null,distill:null};
async function openQuestionnaire(area){
  if(demo){ toast('Questionnaires need the live app'); return; }
  qz={area:area, company:(document.getElementById('coSel')||{}).value||'', manager:'', tier:null, run:null, state:null, distill:null};
  await qzStatus();
}
async function qzStatus(){
  if(freeOn) freeStop();
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Loading…</div>';
  let d; try{ d=await api('/api/questionnaire/status?area='+encodeURIComponent(qz.area)+(qz.company?'&company='+encodeURIComponent(qz.company):'')); }
  catch(e){ v.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'; return; }
  qz.manager=d.manager;
  const coName=(companies.find(c=>c.slug===qz.company)||{}).name||'';
  let html=`<div class="qhead"><button class="iconbtn sm" onclick="go('skills')" aria-label="Back">${ic('back',18)}</button>
    <div><div class="qtitle">${esc(qz.area)}</div><div class="qsub">${esc(qz.manager)} · choose a depth to run</div></div></div>`;
  html+=d.tiers.map(t=>{
    const scopeLbl = t.scope==='universal' ? 'Universal · all companies' : ('This company'+(coName?' · '+esc(coName):''));
    const needCo = t.scope==='company' && !qz.company;
    const prog = needCo ? '<span class="qwarn">Pick a company up top to run this depth</span>'
      : (t.status==='not_started'?'Not started':(t.status==='done'?'Completed':`In progress · ${t.answered}/${t.total||'?'}`));
    let act='';
    if(!needCo){
      if(t.status==='in_progress') act=`<button class="btn go" onclick="qzStart('${t.tier}',false)">Continue</button><button class="btn" onclick="qzStart('${t.tier}',true)">Start over</button>`;
      else if(t.status==='done') act=`<button class="btn go" onclick="qzReviewTier('${t.tier}')">Review &amp; save rules</button><button class="btn" onclick="qzStart('${t.tier}',true)">Re-run</button>`;
      else act=`<button class="btn go" onclick="qzStart('${t.tier}',false)">Start</button>`;
    }
    return `<div class="qcard"><div class="qcardh"><b>${esc(t.label)}</b><span class="qchip">${scopeLbl}</span></div>
      <div class="qprog">${prog}</div>${act?`<div class="row" style="margin-top:9px">${act}</div>`:''}</div>`;
  }).join('');
  v.innerHTML=html;
}
async function qzStart(tier,restart){
  qz.tier=tier;
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Preparing the questions…</div>';
  try{ qz.state=await api('/api/questionnaire/start',{method:'POST',body:JSON.stringify({area:qz.area,tier,company:qz.company,restart})}); }
  catch(e){ toast('Error: '+e.message); qzStatus(); return; }
  qz.run=qz.state.run_id; qzQuestion();
}
function qzQuestion(){
  const s=qz.state; if(!s||s.status==='done'||!s.question){ qzReview(); return; }
  const q=s.question, pct=Math.round((s.idx/Math.max(1,s.total))*100);
  const opts = (q.type==='choice'&&q.options)? `<div class="qopts">${q.options.map(o=>`<button class="qopt" onclick="qzPick(this)">${esc(o)}</button>`).join('')}</div>`:'';
  document.getElementById('view').innerHTML=`<div class="qhead"><button class="iconbtn sm" onclick="qzStatus()" aria-label="Back">${ic('back',18)}</button>
    <div><div class="qtitle">${esc(qz.area)} · ${esc(qz.tier)}</div><div class="qsub">Question ${s.idx+1} of ${s.total}</div></div></div>
    <div class="qprogbar"><div style="width:${pct}%"></div></div>
    <div class="qq">${esc(q.text)}</div>${opts}
    <div class="freehint" id="freehint"></div>
    <div class="livepanel" id="livePanel" style="display:none"><div class="livehead"><span class="livedot"></span><span id="liveLabel">Listening</span></div><div class="livetext" id="liveText"></div></div>
    <textarea id="qAns" class="qansta" placeholder="Type, tap the mic to speak, or go hands-free…"></textarea>
    <div class="row" style="margin-top:10px">
      <button class="iconbtn" id="qzHF" title="Hands-free: I read each question, you answer aloud" onclick="qzHandsFree()" aria-label="Hands-free">${ic('headset',20)}</button>
      <button class="iconbtn" onclick="dictate(this,'qAns')" aria-label="Speak your answer">${ic('mic',20)}</button>
      <button class="btn go" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px" onclick="qzSubmit()">Next ${ic('arrow',16)}</button>
    </div>`;
  if(freeOn){ const hf=document.getElementById('qzHF'); if(hf){ hf.classList.add('rec'); hf.innerHTML=ic('stop',20); }
    const fh=document.getElementById('freehint'); if(fh) fh.classList.add('on'); updateLivePanel(); }
}
async function qzHandsFree(){
  if(freeOn){ freeStop(); qzQuestion(); return; }
  if(demo){ toast('Voice needs the live app'); return; }
  await toggleFree('free', qzVoiceTurn);
  if(!freeOn) return;
  const hf=document.getElementById('qzHF'); if(hf){ hf.classList.add('rec'); hf.innerHTML=ic('stop',20); }
  const fh=document.getElementById('freehint'); if(fh) fh.classList.add('on');
  const q=qz.state&&qz.state.question;
  if(q){ setHint('reading the question…'); await speakAndWait(q.text); if(freeOn){ beep('start'); setHint('Answer when ready…'); } }
}
async function qzVoiceTurn(u){
  freeThinking=true; beep('stop'); setHint('got it, next…'); freeLive=''; updateLivePanel();
  try{ qz.state=await api('/api/questionnaire/answer',{method:'POST',body:JSON.stringify({run_id:qz.run,answer:u})}); }
  catch(e){ toast('Error: '+e.message); }
  freeThinking=false;
  if(!freeOn) return;
  if(!qz.state||!qz.state.question||qz.state.status==='done'){ freeStop(); qzReview(); return; }
  qzQuestion();   // render the next question, hands-free stays active
  const q=qz.state.question;
  if(q && freeOn){ setHint('reading…'); await speakAndWait(q.text); if(freeOn){ beep('start'); setHint('Answer when ready…'); } }
}
function qzPick(btn){ document.querySelectorAll('.qopt').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  const ta=document.getElementById('qAns'); if(ta) ta.value=btn.textContent; }
async function qzSubmit(){
  const ta=document.getElementById('qAns'); const a=(ta?ta.value:'').trim();
  if(!a){ toast('Give an answer, or tap an option'); return; }
  if(recording){ stopDictation(null); }
  try{ qz.state=await api('/api/questionnaire/answer',{method:'POST',body:JSON.stringify({run_id:qz.run,answer:a})}); }
  catch(e){ toast('Error: '+e.message); return; }
  qzQuestion();
}
async function qzReview(){
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Reviewing your answers and drafting the rules…</div>';
  let d; try{ d=await api('/api/questionnaire/distill',{method:'POST',body:JSON.stringify({run_id:qz.run})}); }
  catch(e){ v.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'; return; }
  qz.distill=d; qzRenderReview(d);
}
async function qzReviewTier(tier){
  if(freeOn) freeStop();
  qz.tier=tier;
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Loading your answers and drafting the rules…</div>';
  try{ const d=await api('/api/questionnaire/review',{method:'POST',body:JSON.stringify({area:qz.area,tier,company:qz.company})});
    qz.run=d.run_id; qz.distill=d; qzRenderReview(d); }
  catch(e){ toast('Error: '+e.message); qzStatus(); }
}
function qzRenderReview(d){
  const v=document.getElementById('view');
  let html=`<div class="qhead"><button class="iconbtn sm" onclick="qzStatus()" aria-label="Back">${ic('back',18)}</button>
    <div><div class="qtitle">Review · ${esc(qz.area)}</div><div class="qsub">${esc(qz.manager)} drafted these from your answers</div></div></div>`;
  if(!(d.rules||[]).length && !(d.roadmap||[]).length) html+='<div class="empty">No rules came out of these answers.</div>';
  (d.rules||[]).forEach((r,i)=>{
    const conflict=r.contradicts?`<div class="qconflict">${ic('alert',14)} Conflicts with: “${esc(r.contradicts)}”</div>
      <label class="qover"><input type="checkbox" id="qov${i}"> <span>Override — this supersedes that universal rule for ${esc((companies.find(c=>c.slug===qz.company)||{}).name||'this company')}</span></label>`:'';
    html+=`<div class="qrule"><label class="qinc"><input type="checkbox" id="qinc${i}" checked> include</label>
      <div class="qruletext">${esc(r.rule)}</div>
      <div class="qmeta"><span class="qchip">${r.scope==='universal'?'Universal':'Company'}</span>${r.skill?`<span class="qchip">${esc(r.skill)}</span>`:''}</div>${conflict}</div>`;
  });
  if((d.roadmap||[]).length){ html+=`<div class="cath" style="margin-top:16px">Roadmap & ideas captured</div>`+
    d.roadmap.map((x,i)=>`<div class="qrule"><label class="qinc"><input type="checkbox" id="qrd${i}" checked> add to parking lot</label><div class="qruletext">${esc(x)}</div></div>`).join(''); }
  html+=`<div class="row" style="margin:16px 2px 32px"><button class="btn go" style="flex:1" onclick="qzApply()">Save confirmed rules</button></div>`;
  v.innerHTML=html;
}

async function pfSubmit(skip){

async function pfHandsFree(){

async function pfVoiceTurn(u){
  freeThinking=true; beep('stop'); setHint('got it, next…'); freeLive=''; updateLivePanel();
  try{ pf.state=await api('/api/profile/answer',{method:'POST',body:JSON.stringify({company:pf.company,value:u})}); }catch(e){ toast('Error: '+e.message); }

  if(!freeOn) return;
  if(!pf.state||!pf.state.question||pf.state.status==='done'){ freeStop(); pfReview(); return; }

  if(q && freeOn){ setHint('reading…'); await speakAndWait(q.text); if(freeOn){ beep('start'); setHint('Answer when ready…'); } }
}
let pfQuestionsMeta=null;
async function pfReview(){
  if(freeOn) freeStop();
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Loading…</div>';
  try{ if(!pfQuestionsMeta) pfQuestionsMeta=await api('/api/profile/questions'); }catch(e){ pfQuestionsMeta=[]; }
  let d; try{ d=await api('/api/profile/full?company='+encodeURIComponent(pf.company)); }catch(e){ v.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'; return; }
  pf._data=d.profile||{};
  const coName=(companies.find(c=>c.slug===pf.company)||{}).name||pf.company;
  let html=`<div class="qhead"><button class="iconbtn sm" onclick="pfStatus()" aria-label="Back">${ic('back',18)}</button>
    <div><div class="qtitle">Profile · ${esc(coName)}</div><div class="qsub">What Cortex knows so far · tap any to edit</div></div></div>`;
  let lastSec='';
  pfQuestionsMeta.forEach(q=>{
    if(q.section!==lastSec){ html+=`<div class="cath">${esc(q.section)}</div>`; lastSec=q.section; }
    const val=pf._data[q.field];
    html+=`<div class="qrule" onclick="pfEdit('${q.field}')" style="cursor:pointer">
      <div class="qinc" style="margin-bottom:3px">${esc(q.text)}</div>
      <div class="qruletext" style="${val?'':'color:var(--mut);font-style:italic'}">${val?esc(val):'— not answered'}</div></div>`;
  });
  v.innerHTML=html;
}
async function pfEdit(field){
  const q=(pfQuestionsMeta||[]).find(x=>x.field===field); if(!q) return;
  const val=prompt(q.text, (pf._data&&pf._data[field])||'');
  if(val==null) return;
  try{ const r=await api('/api/profile/set',{method:'POST',body:JSON.stringify({company:pf.company,field,value:val})}); pf._data=r.profile||pf._data; pfReview(); }
  catch(e){ toast('Error: '+e.message); }
}
async function qzApply(){
  const d=qz.distill, rules=[], roadmap=[];
  (d.rules||[]).forEach((r,i)=>{ const inc=document.getElementById('qinc'+i); if(inc&&inc.checked){
    const it={skill:r.skill,rule:r.rule,scope:r.scope}; const ov=document.getElementById('qov'+i);
    if(ov&&ov.checked&&r.contradicts) it.override_of=r.contradicts; rules.push(it); } });
  (d.roadmap||[]).forEach((x,i)=>{ const c=document.getElementById('qrd'+i); if(c&&c.checked) roadmap.push(x); });
  try{ const res=await api('/api/questionnaire/apply',{method:'POST',body:JSON.stringify({company:qz.company,area:qz.area,rules,roadmap})});
    toast(`Saved ${res.rules_saved} rule${res.rules_saved===1?'':'s'}${res.roadmap_added?', '+res.roadmap_added+' to roadmap':''} ✓`); go('skills'); }
  catch(e){ toast('Error: '+e.message); }
}

// ---- chrome ----
function toggleTheme(){ const h=document.documentElement, n=h.dataset.theme==='dark'?'light':'dark';
  h.dataset.theme=n; localStorage.setItem('cortex_theme',n);
  document.querySelector('meta[name=theme-color]').content=n==='dark'?'#0B0F14':'#EEF2F6'; }

// ---- screen wake lock: keep the phone awake on the Talk page / during voice (no more dimming) ----
let wakeLock=null;
async function requestWake(){
  try{ if('wakeLock' in navigator && document.visibilityState==='visible' && !wakeLock){
    wakeLock=await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',()=>{ wakeLock=null; });
  } }catch(e){}
}
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
function syncWake(){ if(tab==='talk' || freeOn) requestWake(); else releaseWake(); }
let tT;
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }

// ---- init ----
(function(){ const th=localStorage.getItem('cortex_theme'); if(th) document.documentElement.dataset.theme=th;
  paintIcons();
  document.getElementById('pc').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  if(token) afterLogin(); })();
// re-lock when the app is reopened after being away >10s
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){ hidAt=Date.now(); }
  else if(IS_MOBILE && token && pinSet && !demo && hidAt && Date.now()-hidAt>300000){ lockNow(); }  // re-lock after 5 min away — MOBILE only (desktop never auto-locks)
  else if(document.visibilityState==='visible'){ syncWake(); }   // re-acquire screen lock (drops when hidden)
});
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{})); }
